name: analyst coverage fetch

# Fills the "Analyst coverage" sheet: for each DATED broker report the
# template names, the muns agent finds the public aggregator page and returns
# target price + price at recommendation (the sanctioned low-confidence
# backup — broker targets have no official feed). The tuple list is read from
# schema-map.json, so template updates change the ask automatically. Then the
# grid is rebuilt, QA-gated and committed.

on:
  workflow_dispatch:
  schedule:
    # Monthly on the 5th — the dated set only changes when the template does.
    - cron: '0 6 5 * *'

permissions:
  contents: write

concurrency:
  group: analyst-coverage-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Pull dated broker reports via the muns agent
        env:
          MUNS_API_TOKEN: ${{ secrets.MUNS_API_TOKEN }}
        run: npx tsx scripts/ingest/analyst-coverage-agent.ts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Project into the workbook grid
        run: |
          pip install openpyxl
          python3 scripts/excel/build_value_store.py
          python3 scripts/excel/fill_template.py
          python3 scripts/excel/build_audit_index.py

      - name: QA gate
        run: python3 scripts/excel/qa_checks.py

      - name: Commit refreshed data
        run: |
          git config user.name "insurance-data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          git add data/ src/data/snapshots/
          if git diff --staged --quiet; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git commit -m "data: analyst coverage refresh @ $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "pushed on attempt $i"; exit 0
            fi
            echo "push attempt $i failed; retrying..."; sleep 5
          done
          echo "ERROR: push failed after retries"; exit 1
