name: analyst coverage fetch

# Fills the "Analyst coverage" sheet: for each DATED broker report the
# template names, the muns agent finds the public aggregator page and returns
# target price + price at recommendation (the sanctioned low-confidence
# backup — broker targets have no official feed). The tuple list is read from
# schema-map.json, so template updates change the ask automatically. Then the
# grid is rebuilt, QA-gated and committed.

on:
  workflow_dispatch:
  schedule:
    # Daily — keep pulling the live broker reports with no human step. New
    # targets land as they publish, and because the merge only ever ADDS (never
    # wipes a filled cell), the flaky aggregator's misses get filled in over
    # successive runs.
    - cron: '0 6 * * *'

permissions:
  contents: write

concurrency:
  group: analyst-coverage-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Pull broker reports - Trendlyne scrape (India IP) + muns agent backup
        env:
          MUNS_API_TOKEN: ${{ secrets.MUNS_API_TOKEN }}
          MUNS_AGENT_URL: ${{ secrets.MUNS_AGENT_URL }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPER_KEY }}
        run: npx tsx scripts/ingest/analyst-coverage-agent.ts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Project into the workbook grid
        run: |
          pip install openpyxl
          python3 scripts/excel/build_value_store.py
          python3 scripts/excel/fill_template.py
          python3 scripts/excel/build_audit_index.py

      - name: QA gate
        run: python3 scripts/excel/qa_checks.py

      - name: Commit refreshed data
        run: |
          git config user.name "insurance-data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          # 1) Commit ONLY the analyst-exclusive source (snapshot + raw pulls). No
          #    other workflow touches these, so this commit always rebases cleanly.
          git add src/data/snapshots/analyst-coverage-snapshot.json data/agent-pulls/analyst-coverage
          git commit -m "data: analyst coverage snapshot @ $(date -u +%Y-%m-%dT%H:%MZ)" || { echo "no snapshot change"; exit 0; }
          # 2) Drop the working-tree generated files; they are rebuilt after landing.
          git checkout -- . 2>/dev/null || true
          git clean -fd data/processed src/data/snapshots 2>/dev/null || true
          # 3) Land on latest main and REBUILD the derived files there (they are
          #    generated, never merged), then commit + push. Retry on races with
          #    other data workflows (this is what the old git-pull-rebase tripped on).
          for i in 1 2 3 4 5; do
            git fetch origin main && git rebase origin/main || { git rebase --abort 2>/dev/null || true; sleep 5; continue; }
            python3 scripts/excel/build_value_store.py >/dev/null 2>&1 || true
            python3 scripts/excel/build_audit_index.py >/dev/null 2>&1 || true
            git add data/ src/data/snapshots/
            git diff --staged --quiet || git commit -m "data: rebuild audit index @ $(date -u +%Y-%m-%dT%H:%MZ)"
            if git push; then echo "pushed on attempt $i"; exit 0; fi
            git log -1 --pretty=%s | grep -q "rebuild audit index" && git reset --hard HEAD~1
            sleep 5
          done
          echo "ERROR: push failed after retries"; exit 1
