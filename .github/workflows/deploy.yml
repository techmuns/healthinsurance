name: deploy

# Builds the Vite SPA and deploys it to Cloudflare so that fresh data reaches
# the live dashboard automatically.
#
# Why this exists: snapshots under src/data/snapshots/ are imported at BUILD
# time, so new data only goes live after a rebuild + redeploy. This workflow
# runs that rebuild:
#   • on every push to main that touches the app or the snapshots (humans), and
#   • after the scheduled `insurance-data-ingest` workflow commits new snapshots
#     (the data-bot's push uses GITHUB_TOKEN, which does NOT re-trigger `push`
#     workflows — so we listen on `workflow_run` to catch those data commits).
#
# Setup required (one-time, in repo Settings → Secrets and variables → Actions):
#   • CLOUDFLARE_API_TOKEN   — a token with "Edit Cloudflare Workers" permission
#   • CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
# Until those secrets exist the job still builds (acting as a CI check) and
# simply skips the deploy step.
#
# Zero-secret alternative: connect the repo to Cloudflare (Workers & Pages →
# "Connect to Git") and let Cloudflare build on push; then this workflow's
# deploy step is redundant and can be deleted.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - 'wrangler.jsonc'
      - '.github/workflows/deploy.yml'
  workflow_run:
    workflows: ['insurance-data-ingest']
    types: [completed]
  workflow_dispatch:

# Never let two deploys race; cancel an in-flight one when a newer commit lands.
concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # For workflow_run (post-ingest) events, only proceed if that run succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On workflow_run, check out the commit the ingest run produced.
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare
        if: ${{ env.CF_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Deploy skipped (no Cloudflare secrets)
        if: ${{ env.CF_API_TOKEN == '' }}
        run: |
          echo "::warning title=Deploy skipped::CLOUDFLARE_API_TOKEN is not set."
          echo "Build succeeded but the site was not deployed."
          echo "Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in repo secrets to enable auto-deploy."
