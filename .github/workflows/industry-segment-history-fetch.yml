name: industry segment history fetch

# Asks the muns chat agent (server-side) for the ALL-INDIA non-life industry
# gross direct premium by segment (Health / Motor / Total) for every fiscal year
# FY15..FY26 — the "Industry Growth" sheet denominators. The GI Council site
# geo-blocks our runner (HTTP 403) and the long annual history lives in the IRDAI
# Handbook, so the agent fetches both instead. The raw answer + any source files
# land in data/agent-pulls/industry-segment-history/. Ingestion into the audit
# overlay is a separate, reviewed step.
#
# Secrets used:
#   MUNS_API_TOKEN      (required) bearer token for the chat agent.
#   SCRAPERAPI_KEY      (optional) routes downloads past site WAFs (repo secret SCRAPER_KEY).
#   INGEST_FETCH_PROXY  (optional) alternative relay URL template ({url} placeholder).

on:
  workflow_dispatch:
  schedule:
    # 07:30 UTC on the 2nd of every month (a day after the segment report lands).
    - cron: '30 7 2 * *'

permissions:
  contents: write

concurrency:
  group: industry-segment-history-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Pull industry GI-segment premium history + download sources
        env:
          MUNS_API_TOKEN: ${{ secrets.MUNS_API_TOKEN }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPER_KEY }}
          INGEST_FETCH_PROXY: ${{ secrets.INGEST_FETCH_PROXY }}
        run: npx tsx scripts/ingest/industry-segment-history-agent.ts

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/agent-pulls/industry-segment-history
          if git diff --staged --quiet; then
            echo "No change — nothing to commit."
            exit 0
          fi
          git commit -m "industry-segment-history: agent pull + sources @ $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "pushed on attempt $i"; exit 0
            fi
            echo "push attempt $i failed; retrying..."; sleep 3
          done
          echo "ERROR: push failed after retries"; exit 1
