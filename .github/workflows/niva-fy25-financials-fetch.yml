name: niva fy25 financials fetch

# Calls the muns chat agent to pull Niva Bupa Health Insurance Ltd FY25
# financials (19 line items, IGAAP/IFRS) as a source-tagged table, then
# downloads the source documents named in the answer (annual report PDFs, etc.)
# into data/agent-pulls/niva-fy25-financials/sources/. Run manually from the
# Actions tab, or on the monthly schedule.
#
# Secrets used:
#   MUNS_API_TOKEN      (required) bearer token for the chat agent — the same
#                       secret the "monthly ingestion" workflow uses.
#   SCRAPERAPI_KEY      (optional) routes downloads past site WAFs (repo secret
#                       SCRAPER_KEY), same as the monthly job.
#   INGEST_FETCH_PROXY  (optional) alternative relay URL template ({url} placeholder).

on:
  workflow_dispatch:
  schedule:
    # 06:30 UTC on the 1st of every month.
    - cron: '30 6 1 * *'

permissions:
  contents: write

concurrency:
  group: niva-fy25-financials-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Pull Niva FY25 financials + download sources
        env:
          MUNS_API_TOKEN: ${{ secrets.MUNS_API_TOKEN }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPER_KEY }}
          INGEST_FETCH_PROXY: ${{ secrets.INGEST_FETCH_PROXY }}
        run: npx tsx scripts/ingest/niva-fy25-financials.ts

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/agent-pulls/niva-fy25-financials
          if git diff --staged --quiet; then
            echo "No change — nothing to commit."
            exit 0
          fi
          git commit -m "niva-fy25-financials: agent pull + sources @ $(date -u +%Y-%m-%dT%H:%MZ)"
          # Rebase onto latest main and retry so a concurrent push never drops our commit.
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "pushed on attempt $i"; exit 0
            fi
            echo "push attempt $i failed; retrying..."; sleep 3
          done
          echo "ERROR: push failed after retries"; exit 1
