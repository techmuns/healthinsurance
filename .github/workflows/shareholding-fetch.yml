name: shareholding fetch

# Keeps the SAHI › Governance › Ownership "Captable" tab (per-holder shareholding
# shares) current with NO manual work.
#
# The named per-holder breakdown (Bupa Singapore Holdings, Fettle Tone, Temasek,
# the mutual funds, …) is NOT on Screener's public page — logged out, Screener
# shows only four class totals. So the source is Niva Bupa's quarterly EXCHANGE
# shareholding-pattern filing (the same document Screener copies from), pulled via
# the muns filings agent. A strict honesty gate (the 15 holders must sum exactly
# to the disclosed total) means a wrong number can never land — a failed gate
# preserves the last-known-good snapshot and commits nothing.
#
# A filed quarter is final, so most runs are a no-op; when a NEWER quarter is
# filed the snapshot advances and the displayed column rolls forward by itself.
#
# Secrets used:
#   MUNS_API_TOKEN  (required for a fresh pull) bearer token for the chat agent.

on:
  schedule:
    # Twice a month (08th & 22nd, 07:00 UTC). Shareholding patterns are filed
    # within ~21 days of each quarter-end (Mar/Jun/Sep/Dec); this always catches
    # the new filing soon after it lands, and no-ops the rest of the year.
    - cron: '0 7 8,22 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: shareholding-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install openpyxl

      - name: Fetch latest shareholding pattern (muns filings agent)
        env:
          MUNS_API_TOKEN: ${{ secrets.MUNS_API_TOKEN }}
          MUNS_AGENT_URL: ${{ secrets.MUNS_AGENT_URL }}
        run: npx tsx scripts/ingest/fetch-shareholding.ts

      - name: Advance the displayed quarter if a newer one was filed
        run: python3 scripts/excel/sync_captable_period.py

      - name: Rebuild value store + audit index
        run: |
          python3 scripts/excel/build_value_store.py
          python3 scripts/excel/build_audit_index.py

      - name: Commit results
        run: |
          git config user.name "insurance-data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          git add src/data/snapshots/shareholding-pattern-snapshot.json \
                  schema-map.json \
                  data/processed/excel-values.json \
                  src/data/snapshots/extracted-data-audit.json
          if git diff --staged --quiet; then
            echo "Shareholding already current — nothing to commit."
            exit 0
          fi
          BRANCH="${{ github.ref_name }}"
          git commit -m "shareholding: auto-refresh from exchange filing @ $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin "$BRANCH" && git push origin "HEAD:$BRANCH"; then
              echo "pushed on attempt $i"; exit 0
            fi
            echo "push retry $i"; sleep $((2 ** i))
          done
          echo "ERROR: push failed after retries"; exit 1
