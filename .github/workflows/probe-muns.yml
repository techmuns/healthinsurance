name: probe muns api (temp)

# TEMPORARY: dumps the muns market-data API contract from a CI runner (which can
# reach fastapi.muns.io). Deleted once the price fetcher is wired to the real
# contract. Manual-trigger only.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - name: Probe the API
        run: npx tsx scripts/ingest/probe-muns-api.ts
