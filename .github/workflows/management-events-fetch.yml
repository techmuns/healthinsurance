name: management events fetch

# Keeps the SAHI Analysis → Management & Events board/leadership feed current.
# Board & leadership changes (appointments / re-appointments / resignations /
# board & KMP changes) for the five SAHIs are pulled via the muns web-search
# agent — the same route the bulk-deals / sector-news / market-intelligence feeds
# use, because direct exchange access is WAF-blocked from CI. Every item is
# source-linked, medium confidence; unattributed items are dropped. 0 events →
# the snapshot is left untouched (honest 'pending'), never fabricated. The
# committed snapshot auto-deploys via the existing Pages build.

on:
  workflow_dispatch:
  schedule:
    # Twice a week (Mon & Thu, IST morning) — board / KMP changes are infrequent.
    - cron: '0 6 * * 1,4'

permissions:
  contents: write

concurrency:
  group: management-events-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Fetch management / governance events (muns agent)
        env:
          MUNS_API_TOKEN: ${{ secrets.MUNS_API_TOKEN }}
          MUNS_AGENT_URL: ${{ secrets.MUNS_AGENT_URL }}
        run: npm run ingest:management-events

      - name: Commit new events
        run: |
          git config user.name "insurance-data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          # Commit ONLY the event payload — so a run that found no new events
          # doesn't create a noisy commit + deploy.
          git add src/data/snapshots/management-events.json
          git diff --staged --quiet && { echo "no new events this run"; exit 0; }
          git commit -m "data: management events @ $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3 4 5; do
            git fetch origin main && git rebase origin/main || { git rebase --abort 2>/dev/null || true; sleep 5; continue; }
            if git push origin HEAD:main; then echo "pushed on attempt $i"; exit 0; fi
            sleep 5
          done
          echo "ERROR: push failed after retries"; exit 1
