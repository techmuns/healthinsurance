name: insurance-data-ingest

# Scheduled official-source data ingestion. Pulls from IRDAI / company IR /
# exchanges, normalises, validates, and commits any changed snapshot files.
# Per the dashboard's source policy, never falls back to mock or unofficial
# data — if a source fails, the workflow logs the failure and continues.
#
# Sources include the IRDAI Non-Life Flash Figures fetcher
# (scripts/ingest/ingest-irdai-nonlife-flash.ts), which runs on the MONTHLY
# cadence below and via workflow_dispatch. When IRDAI's WAF 403s the runner it
# logs the block and keeps the previous snapshot unchanged (never blanks data).

on:
  schedule:
    # Daily — every day at 03:30 UTC (~09:00 IST): live market quote +
    # Moneycontrol analyst coverage for the Street View page.
    - cron: '30 3 * * *'
    # Monthly — first Tuesday of each month at 04:30 UTC
    # (after IRDAI monthly business-figures release window).
    - cron: '30 4 1-7 * 2'
    # Quarterly — second Monday of Feb / May / Aug / Nov at 05:00 UTC.
    - cron: '0 5 8-14 2,5,8,11 1'
    # Annual — first Monday of December at 06:00 UTC.
    - cron: '0 6 1-7 12 1'
  # Auto-trigger on changes to the ingest pipeline itself, so updates to a
  # fetcher / workflow get exercised against live sources immediately.
  push:
    branches: [main]
    paths:
      - 'scripts/ingest/**'
      - '.github/workflows/insurance-data-ingest.yml'
      # A manually-dropped official source file (e.g. the IRDAI monthly XLSX or
      # the handbook PDF) auto-triggers ingestion, so one drop flows straight
      # through to refreshed snapshots + a redeploy. Bot commits use GITHUB_TOKEN,
      # which does not re-trigger push workflows, so this never self-loops.
      - 'data/raw/**'
  workflow_dispatch:
    inputs:
      cadence:
        description: 'Which fetchers to run'
        required: true
        default: 'all'
        type: choice
        options: [all, daily, monthly, quarterly, annual]
      live:
        description: 'Set to "true" to enable live network fetches'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write
  issues: write

# Queue runs instead of racing: simultaneous pushes used to spawn parallel
# ingests whose final `git push` collided (one always lost). Never cancel a
# running ingest — a finished fetch should always get to commit.
concurrency:
  group: insurance-data-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Install Chromium (headless browser for WAF-blocked sources, e.g. IRDAI)
        # Non-fatal: if the browser install hiccups, the ingest still runs and
        # simply falls back to plain fetch (browser path no-ops) — the run must
        # never go dark just because Chromium didn't install.
        continue-on-error: true
        run: npx playwright install --with-deps chromium

      - name: Determine cadence
        id: cadence
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.cadence }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 3 * * *" ]; then
            # The daily cron only runs the 'daily' fetchers (market quote +
            # Moneycontrol analyst coverage) — cheap, idempotent, every day.
            echo "value=daily" >> "$GITHUB_OUTPUT"
          else
            # A push can request a specific cadence via a commit-message tag,
            # e.g. "[ingest:quarterly]" / "[ingest:monthly]" / "[ingest:all]";
            # otherwise fall back to the date-window mapping for cron triggers.
            MSG="$(git log -1 --pretty=%B 2>/dev/null || true)"
            case "$MSG" in
              *"[ingest:all]"*)       echo "value=all"       >> "$GITHUB_OUTPUT" ;;
              *"[ingest:daily]"*)     echo "value=daily"     >> "$GITHUB_OUTPUT" ;;
              *"[ingest:annual]"*)    echo "value=annual"    >> "$GITHUB_OUTPUT" ;;
              *"[ingest:quarterly]"*) echo "value=quarterly" >> "$GITHUB_OUTPUT" ;;
              *"[ingest:monthly]"*)   echo "value=monthly"   >> "$GITHUB_OUTPUT" ;;
              *)
                case "$(date -u +%m-%d)" in
                  12-*) echo "value=annual" >> "$GITHUB_OUTPUT" ;;
                  02-*|05-*|08-*|11-*) echo "value=quarterly" >> "$GITHUB_OUTPUT" ;;
                  *) echo "value=monthly" >> "$GITHUB_OUTPUT" ;;
                esac ;;
            esac
          fi

      - name: Determine network mode
        id: net
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.live }}" = "true" ]; then
            echo "offline=0" >> "$GITHUB_OUTPUT"
          else
            # Scheduled runs default to live; flip to "1" here to dry-run.
            echo "offline=0" >> "$GITHUB_OUTPUT"
          fi

      # Time-boxed + continue-on-error: a slow/blocked source degrades to
      # "staged data only" but can never cancel the workbook build + commit of
      # data already in hand.
      - name: Run ingestion
        timeout-minutes: 18
        continue-on-error: true
        env:
          CADENCE: ${{ steps.cadence.outputs.value }}
          INGEST_OFFLINE: ${{ steps.net.outputs.offline }}
          # Live-fetch wall-clock budget for the GIC monthly resolver — past it
          # the run proceeds with staged files (see ingest-gicouncil-segment.ts).
          GIC_TIME_BUDGET_MS: '480000'
          # Optional: a fetch-proxy URL template (with a {url} placeholder) for
          # sources that block datacenter IPs (IRDAI / NSE return 403 to the
          # runner). Set this repo secret once and every future cron fetches
          # them automatically; unset = unchanged behaviour (those sources stay
          # pending, never fabricated).
          INGEST_FETCH_PROXY: ${{ secrets.INGEST_FETCH_PROXY }}
          # GI Council fetch tiers (scripts/ingest/gic-fetch.ts): an in-region
          # relay key and the muns agent token for listing discovery of last
          # resort. Both optional — the keyless relays + Internet Archive tiers
          # still run without them.
          SCRAPERAPI_KEY: ${{ secrets.SCRAPER_KEY }}
          MUNS_API_TOKEN: ${{ secrets.MUNS_API_TOKEN }}
          MUNS_AGENT_URL: ${{ secrets.MUNS_AGENT_URL }}
        run: npx tsx scripts/ingest/ingest-all.ts

      - name: Show data-health
        run: |
          echo "::group::data-health.json"
          cat src/data/snapshots/data-health.json
          echo "::endgroup::"

      # ─── Data-pipeline watchdog ──────────────────────────────────────────
      # Flags sources that REGRESSED / went STALE / fetched-but-empty (a likely
      # upstream layout change) so a break is never silent. Informational only:
      # never fails the run — the dashboard keeps showing last-real-dated data
      # while a source is down, and the QA gate below still guards honesty.
      - name: Data-health watchdog
        if: always()
        continue-on-error: true
        run: npx tsx scripts/ingest/health-check.ts

      - name: Alert on data-health regressions (open / refresh / close issue)
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const p = `${process.env.RUNNER_TEMP}/data-health-report.json`;
            if (!fs.existsSync(p)) { core.info('no health report — skipping alert'); return; }
            const rep = JSON.parse(fs.readFileSync(p, 'utf8'));
            const title = '⚠️ Data-pipeline health: source(s) need attention';
            const { owner, repo } = context.repo;
            const open = await github.paginate(github.rest.issues.listForRepo, { owner, repo, state: 'open', per_page: 100 });
            const existing = open.find((i) => i.title === title && !i.pull_request);
            if (!rep.issues || rep.issues.length === 0) {
              if (existing) {
                await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body: `✅ All sources healthy again as of ${rep.generated_at} (run ${context.runId}). Auto-closing.` });
                await github.rest.issues.update({ owner, repo, issue_number: existing.number, state: 'closed' });
              }
              return;
            }
            const lines = rep.issues.map((i) => `- **${i.kind}** · \`${i.source_id}\` (${i.cadence}) — ${i.detail}${i.last_success ? ` · last ok ${i.last_success}` : ''}`);
            const body = [
              `The data-pipeline watchdog flagged **${rep.issues.length}** source(s) on run [${context.runId}](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}) (${rep.generated_at}):`,
              '', ...lines, '',
              '**What this means**',
              '- *regressed / blocked* — a source that used to work now errors or is WAF/login-blocked (often an upstream redesign or a dark page).',
              '- *stale* — a source missed its expected refresh window.',
              '- *empty* — it fetched but parsed nothing: the classic "layout changed" signal.',
              '',
              'The dashboard keeps showing the last real, dated value meanwhile — nothing is fabricated. Fix the affected parser/source (or stage the official file); this issue auto-closes once every source is healthy again.',
            ].join('\n');
            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body: `🔄 Still flagged on run ${context.runId} (${rep.generated_at}).` });
            } else {
              await github.rest.issues.create({ owner, repo, title, body });
            }

      # ─── Excel template build (Phases 1-2-5-7) ───────────────────────────
      - name: Setup Python (Excel build)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Excel build deps
        run: pip install openpyxl

      - name: Build filled workbook (extend periods → schema-map → value store → fill → audit index)
        run: |
          # Standing instruction (Neha, 2026-06-11): when data exists for a new
          # period, append its column group to the template automatically.
          python3 scripts/excel/extend_template_periods.py
          python3 scripts/excel/build_schema_map.py templates/niva-bupa-portfolio-review.xlsx
          python3 scripts/excel/build_value_store.py
          python3 scripts/excel/fill_template.py
          python3 scripts/excel/build_audit_index.py

      - name: Upload filled workbook + audit (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: niva-bupa-portfolio-review-filled
          path: |
            output/Niva_Bupa_portfolio_review__filled.xlsx
            schema-map.json
            data/processed/excel-values.json
          if-no-files-found: warn

      - name: QA gate (fails the run on a hard violation, e.g. unsourced value)
        run: python3 scripts/excel/qa_checks.py

      - name: Commit changes
        run: |
          git config user.name "insurance-data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          # Stage only the data layer + snapshot + schema artefacts so unrelated
          # changes never sneak in via a scheduled run. The filled .xlsx is an
          # artifact (git-ignored), not committed.
          git add data/ src/data/snapshots/ schema-map.json templates/
          if ! git diff --staged --quiet; then
            git commit -m "data: ingest ${{ steps.cadence.outputs.value }} run @ $(date -u +%Y-%m-%dT%H:%MZ)"
            # main moves constantly (other sessions + workflows push during a
            # 10-minute ingest) — rebase onto the latest tip and retry, never
            # lose a finished fetch to a push race.
            for i in 1 2 3 4 5; do
              if git pull --rebase --autostash origin main && git push; then
                echo "pushed on attempt $i"; exit 0
              fi
              echo "push attempt $i failed; retrying..."; sleep 5
            done
            echo "ERROR: push failed after retries"; exit 1
          else
            echo "No snapshot changes — nothing to commit."
          fi

# ingest re-trigger marker (bump to re-run a cadence via push): diag-20260602T1530Z
