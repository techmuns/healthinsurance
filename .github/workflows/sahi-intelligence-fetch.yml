name: sahi intelligence fetch

# Generates the AI Market Intelligence feed (upcoming investor meets, earnings /
# board dates, sector & regulatory news, share catalysts) for Niva Bupa + the
# SAHI sector via the muns chat agent, and writes
# src/data/snapshots/market-intelligence-snapshot.json. AI-generated, source-
# linked; clearly labelled in the UI. Can be scheduled to refresh periodically.
#
# Secrets used:
#   MUNS_API_TOKEN  (required) bearer token for the chat agent.

on:
  schedule:
    # Daily (Neha, 2026-06-29): the Curated Market Intelligence feed in the
    # Insights tab is the daily-moving layer (analyst actions, regulatory and
    # sector news, catalysts), so it refreshes every morning at 04:00 UTC. Was
    # weekly (Wed) — bumped to daily so "Today's Investor Pulse" reads truly daily.
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sahi-intelligence-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - name: Generate AI market intelligence (muns agent)
        env:
          MUNS_API_TOKEN: ${{ secrets.MUNS_API_TOKEN }}
          MUNS_AGENT_URL: ${{ secrets.MUNS_AGENT_URL }}
        run: npx tsx scripts/ingest/sahi-intelligence-agent.ts
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/snapshots/market-intelligence-snapshot.json
          if git diff --staged --quiet; then echo "No change."; exit 0; fi
          git commit -m "intelligence: AI market-intelligence feed via muns agent @ $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then echo "pushed $i"; exit 0; fi
            echo "retry $i"; sleep 3
          done
          echo "ERROR: push failed"; exit 1
