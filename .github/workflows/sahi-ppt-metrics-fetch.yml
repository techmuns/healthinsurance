name: sahi ppt metrics fetch

# Dedicated muns-agent search for the SAHI investor-presentation metrics the
# Excel template wants but the pipeline hasn't extracted: retail vs group health
# GWP split, and investment AUM / yield, for FY23-FY26. The raw answer + any
# source files land in data/agent-pulls/sahi-ppt-metrics/. Ingestion into the
# audit overlay is a separate, reviewed step.
#
# Secrets used:
#   MUNS_API_TOKEN      (required) bearer token for the chat agent.
#   SCRAPERAPI_KEY      (optional) routes downloads past site WAFs (repo secret SCRAPER_KEY).
#   INGEST_FETCH_PROXY  (optional) alternative relay URL template ({url} placeholder).

on:
  schedule:
    # Full-auto (Neha, 2026-06-11): monthly (9th) — investor-deck metrics (PPT-first rule).
    - cron: '0 5 9 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sahi-ppt-metrics-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - name: Pull SAHI investor-PPT metrics + download sources
        env:
          MUNS_API_TOKEN: ${{ secrets.MUNS_API_TOKEN }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPER_KEY }}
          INGEST_FETCH_PROXY: ${{ secrets.INGEST_FETCH_PROXY }}
        run: npx tsx scripts/ingest/sahi-ppt-metrics-agent.ts
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/agent-pulls/sahi-ppt-metrics
          if git diff --staged --quiet; then echo "No change."; exit 0; fi
          git commit -m "sahi-ppt-metrics: agent pull + sources @ $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then echo "pushed $i"; exit 0; fi
            echo "retry $i"; sleep 3
          done
          echo "ERROR: push failed"; exit 1
