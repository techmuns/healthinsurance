name: fetch company PDFs (manual)

# Manually-triggered fetch of OFFICIAL company PDFs (annual reports / public
# disclosures) that the insurer sites 403 to datacenter / sandbox IPs. Routes the
# download through ScraperAPI's India IP (the same relay as the monthly IRDAI
# job), validates the bytes are a real PDF, and stages them into
# data/raw/companies/<id>/ — then they feed the annual_report layer (hand-
# transcribe) or the NL-form parser. Curated, official, direct PDF URLs only.
#
# Secrets:
#   SCRAPER_KEY         (already set) free scraperapi.com key — the repo secret is
#                       named SCRAPER_KEY (same one the monthly-ingestion job uses).
#                       With it, downloads route through ScraperAPI's India IP and
#                       get past the insurer WAFs that 403 GitHub datacenter IPs.
#   INGEST_FETCH_PROXY  (optional) alternative relay URL template with a {url}
#                       placeholder, used instead of / in addition to the key.

on:
  schedule:
    # Full-auto (Neha, 2026-06-11): monthly (7th) — company PDFs (ARs/disclosures) refresh.
    - cron: '0 4 7 * *'
  workflow_dispatch:
    inputs:
      company:
        description: 'Optional company_id filter (e.g. "aditya-birla"). Blank = all curated targets.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: fetch-company-pdfs
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Fetch official company PDFs
        env:
          # The repo secret is named SCRAPER_KEY (the monthly-ingestion job maps it
          # the same way) -> exposed to the script as the SCRAPERAPI_KEY env var.
          SCRAPERAPI_KEY: ${{ secrets.SCRAPER_KEY }}
          INGEST_FETCH_PROXY: ${{ secrets.INGEST_FETCH_PROXY }}
          # Passed via env (not interpolated into the shell) to avoid injection.
          COMPANY: ${{ github.event.inputs.company }}
        run: npx tsx scripts/ingest/fetch-company-pdfs.ts

      - name: Commit staged PDF(s)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/companies
          if git diff --staged --quiet; then
            echo "No new PDFs staged this run — nothing to commit."
          else
            git commit -m "fetch-company-pdfs: stage official PDF(s) via ScraperAPI @ $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
