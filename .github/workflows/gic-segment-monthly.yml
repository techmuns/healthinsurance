name: gic-segment-monthly

# The GI Council segment-wise pipeline, end to end, on its own clock — fetch
# (tiered: direct → relays → Internet Archive → muns agent), parse, project
# into the Excel grid, QA, commit. Deliberately SEPARATE from the big
# insurance-data-ingest so an unrelated slow source can never starve the GIC
# chain past a timeout. ~5-10 minutes when sources respond.
#
# Schedule: DAILY (per Neha, 2026-06-29 — "keep fetching till it gets the latest
# data", superseding the earlier every-3-days cadence). GIC publishes a month's
# report around the 3rd week of the FOLLOWING month (e.g. the April-2026 file
# appeared 19 May, the March-2026 file 18 April), not on a fixed date, and it
# 403s datacenter IPs so a given run can be blocked. So: sweep DAILY, and within
# each run retry the live listing up to 4× with backoff (resolveSources step 3) —
# together that keeps fetching across days until the latest report actually lands,
# while staying a free no-op once nothing new is listed. Worst-case pickup lag:
# ~1 day. Also dispatchable + chained from gicouncil-segment-fetch.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: write

concurrency:
  group: gic-segment-monthly
  cancel-in-progress: false

jobs:
  gic:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      # Time-boxed twice over: the script itself stops live-fetching after
      # GIC_TIME_BUDGET_MS and proceeds with staged files, and the step has its
      # own hard cap. continue-on-error means a slow/blocked source can never
      # cancel the projection + commit of data already in hand (the 2026-06-11
      # run lost an entire cycle exactly that way).
      - name: Fetch + parse GI Council segment reports (live, tiered)
        timeout-minutes: 15
        continue-on-error: true
        env:
          INGEST_OFFLINE: '0'
          GIC_TIME_BUDGET_MS: '480000'
          INGEST_FETCH_PROXY: ${{ secrets.INGEST_FETCH_PROXY }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPER_KEY }}
          MUNS_API_TOKEN: ${{ secrets.MUNS_API_TOKEN }}
          MUNS_AGENT_URL: ${{ secrets.MUNS_AGENT_URL }}
        run: npx tsx scripts/ingest/run-gic-segment-annual.ts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Project into the workbook grid (extend periods -> schema -> value store -> fill -> audit index)
        run: |
          pip install openpyxl
          # Standing instruction (Neha, 2026-06-11): when data exists for a new
          # period, append its column group to the template automatically.
          python3 scripts/excel/extend_template_periods.py
          python3 scripts/excel/build_schema_map.py templates/niva-bupa-portfolio-review.xlsx
          python3 scripts/excel/build_value_store.py
          python3 scripts/excel/fill_template.py
          python3 scripts/excel/build_audit_index.py

      - name: QA gate
        run: python3 scripts/excel/qa_checks.py

      - name: Commit refreshed data
        run: |
          git config user.name "insurance-data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          git add data/ src/data/snapshots/ schema-map.json templates/
          if git diff --staged --quiet; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git commit -m "data: GIC segment refresh @ $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "pushed on attempt $i"; exit 0
            fi
            echo "push attempt $i failed; retrying..."; sleep 5
          done
          echo "ERROR: push failed after retries"; exit 1
