name: probe-keyless

# Temporary, fast probe: does data.gov.in's official OGD API have fresh, monthly,
# company-wise non-life premium data, reachable from the runner with the free
# sample key? ~1-2 min, no ingestion, commits nothing. Deleted once answered.

on:
  push:
    branches: [main]
    paths:
      - 'scripts/probe-keyless.ts'
      - '.github/workflows/probe.yml'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Probe data.gov.in OGD API
        run: npx tsx scripts/probe-keyless.ts
