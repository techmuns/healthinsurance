name: probe-keyless

# Temporary, fast reachability probe for keyless alternative data sources
# (chiefly the General Insurance Council). Runs in ~1-2 min — no Playwright, no
# ingestion — so we can confirm whether the runner reaches these hosts without a
# relay before building a parser. Safe to delete once the question is answered.

on:
  push:
    branches: [main]
    paths:
      - 'scripts/probe-keyless.ts'
      - '.github/workflows/probe.yml'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Probe keyless sources
        run: npx tsx scripts/probe-keyless.ts
