name: probe-keyless

# Temporary, fast probe: are the GI Council monthly flash-report PDFs reachable
# from the runner? ~1-2 min, no ingestion, commits nothing. Deleted once answered.

on:
  push:
    branches: [main]
    paths:
      - 'scripts/probe-keyless.ts'
      - '.github/workflows/probe.yml'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Probe GI Council flash PDFs
        run: npx tsx scripts/probe-keyless.ts
