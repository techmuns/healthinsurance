name: monthly ingestion

# Monthly pull of IRDAI Non-Life downloadable Excel sheets.
# Calls the muns chat agent to scrape https://irdai.gov.in/non-life, extracts
# every Excel download link from the answer, and saves only links we have not
# already stored into the repo-root folder `non-life-monthly/`. Repeat links
# are skipped (deduped via non-life-monthly/manifest.json); revised sheets get
# a fresh URL from IRDAI and are saved as new files.
#
# IRDAI returns 403 to GitHub's datacenter IPs, so files are pulled through a
# chain of public fetch-relays (each download is validated as a real .xlsx).
#
# Secrets used:
#   MUNS_API_TOKEN      (required) bearer token for the chat agent.
#   SCRAPERAPI_KEY      (recommended) a free scraperapi.com key. With it, every
#                       file downloads automatically (IRDAI 403s GitHub IPs, so
#                       the request is routed through ScraperAPI's India IP).
#   INGEST_FETCH_PROXY  (optional) an alternative relay URL template with a {url}
#                       placeholder, used instead of / in addition to the key.

on:
  schedule:
    # 06:00 UTC on the 1st of every month.
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monthly-ingestion
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Run monthly ingestion
        env:
          MUNS_API_TOKEN: ${{ secrets.MUNS_API_TOKEN }}
          # Free scraperapi.com key: routes downloads past IRDAI's WAF. With it
          # set, every file downloads automatically.
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          # Optional alternative relay URL template (with a {url} placeholder).
          INGEST_FETCH_PROXY: ${{ secrets.INGEST_FETCH_PROXY }}
        run: npx tsx scripts/monthly-ingestion.ts

      - name: Commit new files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add non-life-monthly
          if git diff --staged --quiet; then
            echo "No new files this run — nothing to commit."
          else
            git commit -m "non-life-monthly: ingest IRDAI Excel sheets @ $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
