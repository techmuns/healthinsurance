name: monthly ingestion

# Monthly pull of IRDAI Non-Life downloadable Excel sheets.
# Calls the muns chat agent to scrape https://irdai.gov.in/non-life, extracts
# every Excel download link from the answer, and saves only links we have not
# already stored into the repo-root folder `non-life-monthly/`. Repeat links
# are skipped (deduped via non-life-monthly/manifest.json); revised sheets get
# a fresh URL from IRDAI and are saved as new files.
#
# Downloads reuse the repo's fetchBuffer() (browser-headered fetch -> headless
# Chromium -> optional fetch proxy), because IRDAI returns 403 to plain requests
# from GitHub's datacenter IPs.
#
# Secrets used:
#   MUNS_API_TOKEN      (required) bearer token for the chat agent.
#   INGEST_FETCH_PROXY  (optional) proxy URL template with a {url} placeholder,
#                       needed when IRDAI 403s the runner even via headless Chrome.

on:
  schedule:
    # 06:00 UTC on the 1st of every month.
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monthly-ingestion
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Install Chromium (headless browser to get past IRDAI's WAF)
        # Non-fatal: if the browser install hiccups, the run still tries the
        # plain-fetch and proxy tiers.
        continue-on-error: true
        run: npx playwright install --with-deps chromium

      - name: Run monthly ingestion
        env:
          MUNS_API_TOKEN: ${{ secrets.MUNS_API_TOKEN }}
          # Enable the headless-browser + proxy download fallbacks.
          INGEST_OFFLINE: '0'
          # Optional: lets downloads leave from a non-blocked IP when IRDAI
          # 403s the runner even through headless Chrome. Unset = those tiers
          # simply no-op.
          INGEST_FETCH_PROXY: ${{ secrets.INGEST_FETCH_PROXY }}
        run: npx tsx scripts/monthly-ingestion.ts

      - name: Commit new files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add non-life-monthly
          if git diff --staged --quiet; then
            echo "No new files this run — nothing to commit."
          else
            git commit -m "non-life-monthly: ingest IRDAI Excel sheets @ $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
