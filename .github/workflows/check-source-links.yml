name: check-source-links

# Guards the promise "no broken source links, ever" (Neha, 2026-06-29).
#
# Every "view source" link the dashboard shows is checked here: the URLs
# hardcoded in src/ and the source_url / url fields in src/data/snapshots/*.json.
# The job FAILS only on a genuinely dead link — a 404 / 410, an unresolvable
# host, or a malformed URL (the kind of defect a renamed or mistyped page
# creates). Bot-blocked / network-throttled sites (403 / 406 / timeout, common
# for Indian regulator + insurer sites on CI IPs) are reported but never fail
# the build, so this stays signal, not noise.
#
# Runs weekly (catch a source that silently retires, as gicouncil.in did) and
# on any push / PR that touches the rendered links or the checker itself.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  push:
    branches: [main]
    paths:
      - 'src/data/snapshots/**'
      - 'src/**/*.ts'
      - 'src/**/*.tsx'
      - 'scripts/check-source-links.ts'
  pull_request:
    paths:
      - 'src/data/snapshots/**'
      - 'src/**/*.ts'
      - 'src/**/*.tsx'
      - 'scripts/check-source-links.ts'

permissions:
  contents: read

concurrency:
  group: check-source-links-${{ github.ref }}
  cancel-in-progress: true

jobs:
  links:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Check every source link resolves
        run: npm run check:links
