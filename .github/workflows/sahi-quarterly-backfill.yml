name: sahi quarterly backfill

# Fills the SAHI-comparison quarterly columns (H1 / 9M / Q1) end-to-end, with no
# human in the loop: for each insurer x interim period it pulls the interim
# investor deck via the muns agent, cleans the answer into structured rows, fills
# the audit overlay, then rebuilds the value store + audit index and commits.
#
# The standalone-quarter columns (Q4 …) are NOT fetched — the sheet derives them
# (full year - 9M) as formula cells. Annual columns are handled by
# sahi-financials-fetch.yml; this workflow only adds the interim periods.
#
# Runs weekly (interim decks land around the Q2/Q3 results dates) and on demand.
# Best-effort: a failed fetch for one cell never aborts the chain, and the build
# + commit always runs so any cells that did come back are published.

on:
  schedule:
    - cron: '0 5 * * 1' # Mondays 05:00 UTC
  workflow_dispatch:
    inputs:
      periods_niva_star:
        description: 'Interim periods for niva-bupa / star-health (H1 + 9M columns)'
        required: false
        default: 'H1FY25 9MFY25 H1FY26 9MFY26'
        type: string
      periods_care:
        description: 'Interim periods for care-health (Q1 + 9M columns)'
        required: false
        default: 'Q1FY25 9MFY25 Q1FY26 9MFY26'
        type: string
      periods_q1:
        description: 'Interim periods for aditya-birla / manipalcigna (Q1 columns)'
        required: false
        default: 'Q1FY25 Q1FY26'
        type: string

permissions:
  contents: write

concurrency:
  group: sahi-quarterly-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 320
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - run: pip install --quiet --disable-pip-version-check openpyxl

      - name: Fetch + clean the interim decks
        env:
          MUNS_API_TOKEN: ${{ secrets.MUNS_API_TOKEN }}
          MUNS_AGENT_URL: ${{ secrets.MUNS_AGENT_URL }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPER_KEY }}
          INGEST_FETCH_PROXY: ${{ secrets.INGEST_FETCH_PROXY }}
          PERIODS_NIVA_STAR: ${{ inputs.periods_niva_star }}
          PERIODS_CARE: ${{ inputs.periods_care }}
          PERIODS_Q1: ${{ inputs.periods_q1 }}
        run: |
          set +e
          # Per-insurer interim columns mirror the SAHI-comparison sheet: niva/star
          # report H1 + 9M; care reports Q1 + 9M; aditya/manipal report Q1 only.
          # (Q4 columns are derived = full year - 9M, so they are never fetched.)
          # DYNAMIC interim window — the last two fiscal years; advances itself every
          # year (Indian FY ends 31 Mar) so new years flow in with ZERO edits. A
          # manual dispatch can still override via the workflow inputs.
          NOWY=$(date -u +%Y); NOWM=$(date -u +%m); BASEFY=$NOWY; [ "$((10#$NOWM))" -ge 4 ] && BASEFY=$((NOWY+1))
          fa=FY$(printf '%02d' $(((BASEFY-1)%100))); fb=FY$(printf '%02d' $(((BASEFY-2)%100)))
          PERIODS_NIVA_STAR="${PERIODS_NIVA_STAR:-H1$fb 9M$fb H1$fa 9M$fa}"
          PERIODS_CARE="${PERIODS_CARE:-Q1$fb 9M$fb Q1$fa 9M$fa}"
          PERIODS_Q1="${PERIODS_Q1:-Q1$fb Q1$fa}"
          declare -A PERIODS
          PERIODS[niva-bupa]="$PERIODS_NIVA_STAR"
          PERIODS[star-health]="$PERIODS_NIVA_STAR"
          PERIODS[care-health]="$PERIODS_CARE"
          PERIODS[aditya-birla]="$PERIODS_Q1"
          PERIODS[manipalcigna]="$PERIODS_Q1"
          for company in niva-bupa star-health care-health aditya-birla manipalcigna; do
            for period in ${PERIODS[$company]}; do
              echo "::group::$company $period"
              FETCH_COMPANY_ID="$company" FETCH_PERIOD="$period" \
                timeout 360 npx tsx scripts/ingest/sahi-financials-agent.ts || echo "fetch skipped/timed-out: $company $period"
              npx tsx scripts/ingest/sahi-financials-clean.ts "$company" "$period" || echo "clean failed: $company $period"
              echo "::endgroup::"
            done
          done
          exit 0

      - name: Publish — land pulls, then re-apply fills onto latest main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 1) Land the raw + cleaned agent pulls (new files — these rarely conflict).
          #    They must reach main so step 2 can re-run the fill from them after a reset.
          git add data/agent-pulls/sahi-financials
          if ! git diff --staged --quiet; then
            git commit -m "sahi quarterly backfill: agent pulls @ $(date -u +%Y-%m-%dT%H:%MZ)"
            for i in 1 2 3 4 5; do
              git fetch origin main && git rebase origin/main && git push && break || { git rebase --abort 2>/dev/null || true; echo "pulls push retry $i"; sleep 5; }
            done
          else
            echo "No new agent pulls."
          fi
          # 2) Re-apply EVERY cleaned fill onto the latest main, then rebuild + commit.
          #    Resetting to main on each attempt means the overlay + generated files are
          #    regenerated on top of concurrent commits and NEVER text-merged — which was
          #    the failure (two writers colliding on audit-overlay.json / the index).
          for i in 1 2 3 4 5 6; do
            git fetch origin main || { echo "fetch retry $i"; sleep 5; continue; }
            git reset --hard origin/main
            for f in data/agent-pulls/sahi-financials/*/cleaned-*.json; do
              [ -e "$f" ] && npx tsx scripts/ingest/audit-fill.ts fill --from "$f" || true
            done
            python3 scripts/excel/build_value_store.py || { echo "value-store build failed"; exit 1; }
            python3 scripts/excel/build_audit_index.py || { echo "audit-index build failed"; exit 1; }
            git add src/data/snapshots/audit-overlay.json data/processed/excel-values.json data/processed/excel-held-back.json src/data/snapshots/extracted-data-audit.json
            if git diff --staged --quiet; then echo "Nothing new to fill — already current."; exit 0; fi
            git commit -m "sahi quarterly backfill: fill interim columns @ $(date -u +%Y-%m-%dT%H:%MZ)"
            if git push; then echo "published on attempt $i"; exit 0; fi
            echo "publish retry $i"; sleep 5
          done
          echo "ERROR: publish failed after retries"; exit 1
